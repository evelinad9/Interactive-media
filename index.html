<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-video
          id="surfing-video"
          src="./surfing-video.mp4"
          autoplay
          loop="true"
          crossorigin="anonymous"
        ></a-video>
      </a-assets>

      <a-box
        position="0 1 -3"
        rotation="0 0 0"
        color="#1a1a1a"
        width="2.2"
        height="1.7"
        depth="0.1"
      ></a-box>

      <a-entity
        geometry="primitive: cylinder; height: 3; radius: 2"
        scale="-0.0212 0.34393 0.02092"
        position="-0.16971 2.30627 -3.00218"
        rotation="0 0 21.89500918312928"
        color="#1a1a1a"
      ></a-entity>

      <a-entity
        geometry="primitive: cylinder; height: 3; radius: 2; color: #1a1a1a"
        scale="-0.0212 0.34393 0.02092"
        position="0.17361 2.30627 -3.00218"
        rotation="0.6726524514835865 -0.567801174974646 -18.95344386292763"
      ></a-entity>

      <a-plane
        src="#surfing-video"
        position="0 1 -2.935"
        rotation="0 0 0"
        width="2"
        height="1.5"
      ></a-plane>
      <a-plane
        height="10"
        width="10"
        material="side: double"
        color="brown"
        rotation="90 0 0"
        position="0 0 -12.27834"
        scale="3.40594 3.20323 3"
      ></a-plane>
      <a-sky color="#b6bafc"></a-sky>
    </a-scene>
  </body>
</html>
